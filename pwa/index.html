<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>memechat</title>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- bootstrap icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <!-- custom css -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>

<body>
    <nav class="text-light">
        <p class="title">anonymous</p>
    </nav>

    <div class="chat my-5">
        <div class="message">
            <div class="message-content">
                <p class="message-text">TEST</p>
                <p class="message-time">10:00 AM</p>
            </div>
        </div>

        <div class="message">
            <div class="message-content">
                <p class="message-text">TEST</p>
                <p class="message-time">10:01 AM</p>
            </div>
        </div>

        <div class="message">
            <div class="message-content">
                <p class="message-text">TEST</p>
                <p class="message-time">10:02 AM</p>
            </div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-group">
            <input type="text" class="form-control rounded-5 me-2 ms-2" placeholder="Type a message..."
                aria-label="Type a message..." aria-describedby="button-addon2" />
            <button class="btn btn-primary rounded-circle me-2" type="button">
                <i class="material-icons">&#xe163;</i>
            </button>
        </div>
    </div>
</body>

</html>
