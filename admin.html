<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <!-- Zelfde navbar als Discover.html -->
    </nav>

    <div class="container mt-4">
        <button id="reset-products" class="btn btn-danger mb-3">Reset Producten</button>
        <br>
        <br>
        <!-- Besteloverzicht -->
        <h2 class="section-title">Bestellingen</h2>
        <div id="orders-grid" class="mb-5"></div>

        <!-- Productbeheer -->
        <h2 class="section-title">Productbeheer</h2>

        <!-- Producttabel -->
        <div class="table-responsive">
            <table class="table table-dark">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Naam</th>
                        <th>Prijs</th>
                        <th>edit</th>
                    </tr>
                </thead>
                <tbody id="products-table">
                </tbody>
            </table>
        </div>

        <!-- Product Toevoegen Form -->
        <div class="card mb-4 bg-dark">
            <div class="card-body">
                <h5 class="section-title">Product Toevoegen</h5>
                <form id="add-product-form" class="p-2">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="product-name" placeholder="Naam" required>
                    </div>
                    <div class="mb-3">
                        <input type="number" step="0.01" class="form-control" id="product-price" placeholder="Prijs"
                            required>
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" id="product-image" placeholder="Afbeelding URL">
                    </div>
                    <button type="submit" class="btn btn-danger">Toevoegen</button>
                </form>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="javascript/admin.js"></script>
</body>

</html>
